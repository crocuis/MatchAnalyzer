name: sample-ingest-fixtures

permissions:
  contents: read

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    concurrency:
      group: sample-ingest-fixtures
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_BUCKET: workflow-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$R2_BUCKET"
      - run: python3 -m pip install -r batch/requirements.txt
      - run: python3 -m batch.src.jobs.ingest_fixtures_job
