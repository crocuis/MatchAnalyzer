name: ingest-fixtures

permissions:
  contents: read

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    concurrency:
      group: ingest-fixtures
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r batch/requirements.txt
      - run: python3 -m batch.src.jobs.ingest_fixtures_job
