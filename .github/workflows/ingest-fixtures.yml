name: ingest-fixtures

permissions:
  contents: read

on:
  schedule:
    # 10:00 and 22:00 Asia/Seoul. Keep this below 3/day unless freshness needs change.
    - cron: "0 1,13 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Start UTC date for the fixture sync window in YYYY-MM-DD format. Defaults to current UTC date."
        required: false
        type: string

jobs:
  ingest:
    concurrency:
      group: ingest-fixtures
      cancel-in-progress: true
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL || secrets.DATABASE_URL }}
      REAL_FIXTURE_SYNC_MODE: schedule
      R2_BUCKET: workflow-artifacts
      FIXTURE_FUTURE_START_DAYS: 7
      FIXTURE_FUTURE_END_DAYS: 14
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: batch/requirements.txt
      - run: |
          test -n "$DATABASE_URL"
          test -n "$R2_BUCKET"
      - name: Resolve target dates
        shell: bash
        run: |
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE="$(date -u +%F)"
          fi
          TARGET_DATE_CANONICAL="$(date -u -d "$TARGET_DATE" +%F 2>/dev/null || true)"
          if [ -z "$TARGET_DATE_CANONICAL" ] || [ "$TARGET_DATE_CANONICAL" != "$TARGET_DATE" ]; then
            echo "target_date must be a valid YYYY-MM-DD UTC date" >&2
            exit 1
          fi
          {
            echo "FIXTURE_DATES<<EOF"
            date -u -d "$TARGET_DATE_CANONICAL" +%F
            for OFFSET in $(seq "$FIXTURE_FUTURE_START_DAYS" "$FIXTURE_FUTURE_END_DAYS"); do
              date -u -d "$TARGET_DATE_CANONICAL +${OFFSET} days" +%F
            done
            echo "EOF"
          } >> "$GITHUB_ENV"
      - run: python3 -m pip install -r batch/requirements.txt
      - name: Ingest fixture window
        shell: bash
        run: |
          while IFS= read -r TARGET_DATE; do
            if [ -z "$TARGET_DATE" ]; then
              continue
            fi
            echo "::group::REAL_FIXTURE_DATE=$TARGET_DATE"
            REAL_FIXTURE_DATE="$TARGET_DATE" python3 -m batch.src.jobs.ingest_fixtures_job
            echo "::endgroup::"
          done <<< "$FIXTURE_DATES"
