name: deploy-production

permissions:
  contents: read

on:
  workflow_run:
    workflows: [test]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-production-main
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate production secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_PAGES_PROJECT_NAME"
          test -n "$VITE_API_BASE_URL"
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"

      - run: npm install

      - name: Apply Supabase migrations
        working-directory: .
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push --linked --include-all

      - name: Deploy Cloudflare Worker
        run: npm run deploy:api

      - name: Deploy Cloudflare Pages
        run: npm run deploy:web

      - name: Smoke check production endpoints
        run: |
          curl --fail --silent --show-error "${VITE_API_BASE_URL}/health"
          curl --fail --silent --show-error "${VITE_API_BASE_URL}/matches"
