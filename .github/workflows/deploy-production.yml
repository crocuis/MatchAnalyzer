name: deploy-production

permissions:
  contents: read

on:
  workflow_run:
    workflows: [test]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production-main
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL || secrets.DATABASE_URL }}
      MATCH_ANALYZER_MIGRATION_BASELINE_VERSION: ${{ vars.MATCH_ANALYZER_MIGRATION_BASELINE_VERSION }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      MATCH_ANALYZER_ARTIFACT_BASE_URL: ${{ vars.MATCH_ANALYZER_ARTIFACT_BASE_URL }}
      OPERATIONAL_REPORTS_API_KEY: ${{ secrets.OPERATIONAL_REPORTS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: batch/requirements.txt

      - name: Validate production secrets
        run: |
          test -n "$DATABASE_URL"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_PAGES_PROJECT_NAME"
          test -n "$VITE_API_BASE_URL"

      - run: npm install --no-audit --no-fund

      - run: python3 -m pip install -r batch/requirements.txt

      - name: Apply Postgres migrations
        run: python3 scripts/apply_postgres_migrations.py

      - name: Smoke check Neon database
        run: |
          python3 - <<'PY'
          import os

          from batch.src.storage.db_client import DbClient

          database_url = os.environ["DATABASE_URL"]
          client = DbClient(database_url, "")
          rows = client.read_rows("matches", ("id",))
          if not rows:
              raise SystemExit("Neon DATABASE_URL is reachable, but public.matches is empty")
          print(f"Neon database smoke ok: matches={len(rows)}")
          PY

      - name: Configure Cloudflare Worker secrets
        run: |
          printf '%s' "$DATABASE_URL" | npm --workspace apps/api exec -- wrangler secret put DATABASE_URL
          if [ -n "${MATCH_ANALYZER_ARTIFACT_BASE_URL:-}" ]; then
            printf '%s' "$MATCH_ANALYZER_ARTIFACT_BASE_URL" | npm --workspace apps/api exec -- wrangler secret put MATCH_ANALYZER_ARTIFACT_BASE_URL
          fi
          if [ -n "${OPERATIONAL_REPORTS_API_KEY:-}" ]; then
            printf '%s' "$OPERATIONAL_REPORTS_API_KEY" | npm --workspace apps/api exec -- wrangler secret put OPERATIONAL_REPORTS_API_KEY
          fi

      - name: Deploy Cloudflare Worker
        run: npm run deploy:api

      - name: Configure Cloudflare Pages runtime secrets
        run: |
          printf '%s' "$VITE_API_BASE_URL" | npm --workspace apps/api exec -- wrangler pages secret put MATCH_ANALYZER_API_ORIGIN --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME"
          if [ -n "${OPERATIONAL_REPORTS_API_KEY:-}" ]; then
            printf '%s' "$OPERATIONAL_REPORTS_API_KEY" | npm --workspace apps/api exec -- wrangler pages secret put OPERATIONAL_REPORTS_API_KEY --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME"
          fi

      - name: Deploy Cloudflare Pages
        run: npm run deploy:web

      - name: Smoke check production endpoints
        run: |
          curl --fail --silent --show-error "${VITE_API_BASE_URL}/health"
          curl --fail --silent --show-error "${VITE_API_BASE_URL}/matches"
