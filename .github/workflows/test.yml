name: test

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    concurrency:
      group: test-workflow
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python3 -m pip install -r batch/requirements.txt
      - run: npm test
      - run: npm --workspace apps/api run test
      - run: npm --workspace apps/web run test
      - run: python3 -m pytest
