name: test

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      SUPABASE_URL: https://placeholder.supabase.local
      SUPABASE_SERVICE_KEY: placeholder-service-key
      R2_BUCKET: workflow-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python3 -m pip install -r batch/requirements.txt
      - run: npm test
      - run: npm --workspace apps/api run test
      - run: npm --workspace apps/web run test
      - run: python3 -m pytest
      - run: python3 -m batch.src.jobs.ingest_fixtures_job
      - run: python3 -m batch.src.jobs.ingest_markets_job
      - run: python3 -m batch.src.jobs.run_predictions_job
      - run: python3 -m batch.src.jobs.run_post_match_review_job
