name: test

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

jobs:
  verify:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      DATABASE_URL: https://placeholder.db.local
      R2_BUCKET: workflow-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: batch/requirements.txt
      - run: npm install --no-audit --no-fund
      - run: python3 -m pip install -r batch/requirements.txt
      - run: npm test
      - run: python3 -m pytest
