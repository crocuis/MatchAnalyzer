name: run-predictions

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "UTC date to predict in YYYY-MM-DD format. Defaults to current UTC date."
        required: false
        type: string
      target_match_ids:
        description: "Comma-separated match ids to refresh directly. When set, overrides target_date."
        required: false
        type: string
      enable_llm_advisory:
        description: "Enable LLM prediction advisory payload generation."
        required: false
        default: false
        type: boolean
      llm_provider:
        description: "LLM provider to use when advisory is enabled."
        required: false
        default: nvidia
        type: choice
        options:
          - nvidia
          - openrouter
      llm_model:
        description: "Optional provider model override. Leave blank to use the code default."
        required: false
        type: string

jobs:
  predict:
    concurrency:
      group: run-predictions
      cancel-in-progress: true
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_BUCKET: workflow-artifacts
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_APP_URL: ${{ vars.OPENROUTER_APP_URL }}
      OPENROUTER_APP_TITLE: ${{ vars.OPENROUTER_APP_TITLE }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: batch/requirements.txt
      - run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$R2_BUCKET"
      - name: Resolve target date
        shell: bash
        run: |
          TARGET_MATCH_IDS="${{ github.event.inputs.target_match_ids }}"
          if [ -n "$TARGET_MATCH_IDS" ]; then
            echo "REAL_PREDICTION_MATCH_IDS=$TARGET_MATCH_IDS" >> "$GITHUB_ENV"
            echo "DAILY_PICK_SYNC_ENABLED=0" >> "$GITHUB_ENV"
            exit 0
          fi
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE="$(date -u +%F)"
          fi
          echo "REAL_PREDICTION_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
          echo "DAILY_PICK_SYNC_ENABLED=1" >> "$GITHUB_ENV"
      - name: Resolve LLM advisory settings
        shell: bash
        run: |
          if [ "${{ github.event.inputs.enable_llm_advisory }}" = "true" ]; then
            echo "LLM_PREDICTION_ADVISORY_ENABLED=1" >> "$GITHUB_ENV"
          else
            echo "LLM_PREDICTION_ADVISORY_ENABLED=0" >> "$GITHUB_ENV"
          fi
          LLM_PROVIDER_INPUT="${{ github.event.inputs.llm_provider }}"
          if [ -z "$LLM_PROVIDER_INPUT" ]; then
            LLM_PROVIDER_INPUT="nvidia"
          fi
          echo "LLM_PROVIDER=$LLM_PROVIDER_INPUT" >> "$GITHUB_ENV"
          LLM_MODEL_INPUT="${{ github.event.inputs.llm_model }}"
          if [ -n "$LLM_MODEL_INPUT" ]; then
            echo "LLM_PREDICTION_MODEL=$LLM_MODEL_INPUT" >> "$GITHUB_ENV"
          fi
      - run: python3 -m pip install -r batch/requirements.txt
      - name: Backfill external prediction signals
        shell: bash
        run: |
          BACKFILL_ARGS=(--apply --clubelo-date-stride-days 1)
          if [ -n "${REAL_PREDICTION_MATCH_IDS:-}" ]; then
            BACKFILL_ARGS+=(--match-ids "$REAL_PREDICTION_MATCH_IDS")
          else
            BACKFILL_ARGS+=(--kickoff-date "$REAL_PREDICTION_DATE")
          fi
          python3 -m batch.src.jobs.backfill_external_prediction_signals_job "${BACKFILL_ARGS[@]}"
      - run: python3 -m batch.src.jobs.run_predictions_job
      - name: Sync daily pick snapshot
        if: ${{ env.DAILY_PICK_SYNC_ENABLED == '1' }}
        run: |
          DAILY_PICK_SYNC_DATE="${REAL_PREDICTION_DATE:-$(date -u +%F)}" \
            python3 -m batch.src.jobs.run_daily_pick_tracking_job
      - name: Export daily pick API artifact
        if: ${{ env.DAILY_PICK_SYNC_ENABLED == '1' }}
        run: |
          DAILY_PICK_ARTIFACT_DATE="${REAL_PREDICTION_DATE:-$(date -u +%F)}" \
            python3 -m batch.src.jobs.export_daily_pick_artifacts_job
