name: run-predictions

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r batch/requirements.txt
      - run: python3 batch/src/model/predict_matches.py
