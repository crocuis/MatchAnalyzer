name: run-predictions

permissions:
  contents: read

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "UTC date to predict in YYYY-MM-DD format. Defaults to current UTC date."
        required: false
        type: string

jobs:
  predict:
    concurrency:
      group: run-predictions
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_BUCKET: workflow-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$R2_BUCKET"
      - name: Resolve target date
        shell: bash
        run: |
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE="$(date -u +%F)"
          fi
          echo "REAL_PREDICTION_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
      - run: python3 -m pip install -r batch/requirements.txt
      - run: python3 -m batch.src.jobs.run_predictions_job
