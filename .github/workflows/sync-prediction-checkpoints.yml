name: sync-prediction-checkpoints

permissions:
  contents: read

on:
  schedule:
    # Hourly scan; the job refreshes only matches crossing T-72H, T-24H, T-6H, or T-1H.
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "Minutes to look back for missed prediction checkpoint windows."
        required: false
        default: "60"
        type: string
      enable_llm_advisory:
        description: "Enable LLM prediction advisory payload generation."
        required: false
        default: false
        type: boolean
      llm_provider:
        description: "LLM provider to use when advisory is enabled."
        required: false
        default: nvidia
        type: choice
        options:
          - nvidia
          - openrouter
      llm_model:
        description: "Optional provider model override. Leave blank to use the code default."
        required: false
        type: string

jobs:
  sync:
    concurrency:
      group: sync-prediction-checkpoints
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_BUCKET: workflow-artifacts
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_APP_URL: ${{ vars.OPENROUTER_APP_URL }}
      OPENROUTER_APP_TITLE: ${{ vars.OPENROUTER_APP_TITLE }}
      BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
      BSD_LINEUP_LOOKAHEAD_HOURS: 48
      PREDICTION_SYNC_LOOKBACK_MINUTES: ${{ github.event.inputs.lookback_minutes || '60' }}
      LLM_PREDICTION_ADVISORY_ENABLED: ${{ github.event.inputs.enable_llm_advisory == 'true' && '1' || '0' }}
      LLM_PROVIDER: ${{ github.event.inputs.llm_provider || 'nvidia' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: batch/requirements.txt
      - run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$R2_BUCKET"
      - name: Resolve optional LLM model
        shell: bash
        run: |
          LLM_MODEL_INPUT="${{ github.event.inputs.llm_model }}"
          if [ -n "$LLM_MODEL_INPUT" ]; then
            echo "LLM_PREDICTION_MODEL=$LLM_MODEL_INPUT" >> "$GITHUB_ENV"
          fi
      - run: python3 -m pip install -r batch/requirements.txt
      - name: Sync due prediction checkpoint snapshots
        shell: bash
        run: |
          SYNC_LOG="$(mktemp)"
          python3 -m batch.src.jobs.sync_prediction_checkpoints_job | tee "$SYNC_LOG"
          SYNC_TARGET_MATCH_IDS="$(
            python3 -c 'import json, sys; from pathlib import Path; lines = [line.strip() for line in Path(sys.argv[1]).read_text().splitlines() if line.strip()]; payload = json.loads(lines[-1]) if lines else {}; print(",".join(payload.get("target_match_ids", [])))' "$SYNC_LOG"
          )"
          SYNC_EXTERNAL_SIGNAL_MATCH_IDS="$(
            python3 -c 'import json, sys; from pathlib import Path; lines = [line.strip() for line in Path(sys.argv[1]).read_text().splitlines() if line.strip()]; payload = json.loads(lines[-1]) if lines else {}; print(",".join(payload.get("external_signal_match_ids", [])))' "$SYNC_LOG"
          )"
          SYNC_DAILY_PICK_DATES="$(
            python3 -c 'import json, sys; from pathlib import Path; lines = [line.strip() for line in Path(sys.argv[1]).read_text().splitlines() if line.strip()]; payload = json.loads(lines[-1]) if lines else {}; print(",".join(payload.get("daily_pick_dates", [])))' "$SYNC_LOG"
          )"
          echo "SYNC_TARGET_MATCH_IDS=$SYNC_TARGET_MATCH_IDS" >> "$GITHUB_ENV"
          echo "SYNC_EXTERNAL_SIGNAL_MATCH_IDS=$SYNC_EXTERNAL_SIGNAL_MATCH_IDS" >> "$GITHUB_ENV"
          echo "SYNC_DAILY_PICK_DATES=$SYNC_DAILY_PICK_DATES" >> "$GITHUB_ENV"
      - name: Backfill external prediction signals
        if: ${{ env.SYNC_EXTERNAL_SIGNAL_MATCH_IDS != '' }}
        shell: bash
        run: |
          python3 -m batch.src.jobs.backfill_external_prediction_signals_job \
            --apply \
            --match-ids "$SYNC_EXTERNAL_SIGNAL_MATCH_IDS" \
            --clubelo-date-stride-days 1
      - name: Refresh changed predictions
        if: ${{ env.SYNC_TARGET_MATCH_IDS != '' }}
        run: |
          REAL_PREDICTION_MATCH_IDS="$SYNC_TARGET_MATCH_IDS" python3 -m batch.src.jobs.run_predictions_job
      - name: Skip empty prediction refresh
        if: ${{ env.SYNC_TARGET_MATCH_IDS == '' }}
        run: echo "No due prediction checkpoints detected; skipping prediction refresh."
      - name: Refresh daily picks for changed prediction dates
        if: ${{ env.SYNC_DAILY_PICK_DATES != '' }}
        shell: bash
        run: |
          IFS=',' read -ra TARGET_DATES <<< "$SYNC_DAILY_PICK_DATES"
          for TARGET_DATE in "${TARGET_DATES[@]}"; do
            DAILY_PICK_SYNC_DATE="$TARGET_DATE" python3 -m batch.src.jobs.run_daily_pick_tracking_job
            DAILY_PICK_ARTIFACT_DATE="$TARGET_DATE" python3 -m batch.src.jobs.export_daily_pick_artifacts_job
          done
      - name: Skip empty daily pick refresh
        if: ${{ env.SYNC_DAILY_PICK_DATES == '' }}
        run: echo "No daily-pick prediction checkpoints changed; skipping daily pick refresh."
