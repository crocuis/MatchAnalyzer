name: sync-match-results

permissions:
  contents: read

on:
  schedule:
    # Every 2 hours, offset from broader ingest jobs.
    - cron: "35 */2 * * *"
  workflow_dispatch:
    inputs:
      delay_hours:
        description: "Minimum hours after kickoff before checking for final result."
        required: false
        default: "2"
        type: string
      lookback_hours:
        description: "How far back to search unsettled matches."
        required: false
        default: "48"
        type: string

jobs:
  sync:
    concurrency:
      group: sync-match-results
      cancel-in-progress: true
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_BUCKET: workflow-artifacts
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      RESULT_SYNC_DELAY_HOURS: ${{ github.event.inputs.delay_hours || '2' }}
      RESULT_SYNC_LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '48' }}
      LLM_REVIEW_ADVISORY_ENABLED: "0"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: batch/requirements.txt
      - run: |
          test -n "$DATABASE_URL"
          test -n "$R2_BUCKET"
      - run: python3 -m pip install -r batch/requirements.txt
      - name: Sync newly settled match results
        shell: bash
        run: |
          SYNC_LOG="$(mktemp)"
          python3 -m batch.src.jobs.sync_match_results_job | tee "$SYNC_LOG"
          python3 -c 'import json, sys; from pathlib import Path; lines = [line.strip() for line in Path(sys.argv[1]).read_text().splitlines() if line.strip()]; payload = json.loads(lines[-1]) if lines else {}; [print(date) for date in payload.get("changed_dates", [])]' "$SYNC_LOG" > changed-dates.txt
          {
            echo "SYNC_CHANGED_DATES<<EOF"
            cat changed-dates.txt
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Refresh changed result dates
        shell: bash
        run: |
          if [ -z "$SYNC_CHANGED_DATES" ]; then
            echo "No changed match results detected; skipping review refresh."
            exit 0
          fi
          while IFS= read -r TARGET_DATE; do
            if [ -z "$TARGET_DATE" ]; then
              continue
            fi
            echo "::group::REAL_REVIEW_DATE=$TARGET_DATE"
            REAL_REVIEW_DATE="$TARGET_DATE" python3 -m batch.src.jobs.run_post_match_review_job
            DAILY_PICK_SETTLE_DATE="$TARGET_DATE" python3 -m batch.src.jobs.run_daily_pick_tracking_job
            DAILY_PICK_ARTIFACT_DATE="$TARGET_DATE" python3 -m batch.src.jobs.export_daily_pick_artifacts_job
            echo "::endgroup::"
          done <<< "$SYNC_CHANGED_DATES"
      - name: Collect pending Betman watchlist dates
        shell: bash
        run: |
          python3 -m batch.src.jobs.report_daily_pick_segment_quality_job --pending-dates-only > betman-watchlist-dates.txt
          {
            echo "BETMAN_WATCHLIST_DATES<<EOF"
            cat betman-watchlist-dates.txt
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Retry pending Betman watchlist settlements
        shell: bash
        run: |
          if [ -z "$BETMAN_WATCHLIST_DATES" ]; then
            echo "No pending Betman watchlist dates detected."
            exit 0
          fi
          while IFS= read -r TARGET_DATE; do
            if [ -z "$TARGET_DATE" ]; then
              continue
            fi
            echo "::group::BETMAN_WATCHLIST_SETTLE_DATE=$TARGET_DATE"
            DAILY_PICK_SETTLE_DATE="$TARGET_DATE" python3 -m batch.src.jobs.run_daily_pick_tracking_job
            DAILY_PICK_ARTIFACT_DATE="$TARGET_DATE" python3 -m batch.src.jobs.export_daily_pick_artifacts_job
            echo "::endgroup::"
          done <<< "$BETMAN_WATCHLIST_DATES"
      - name: Report Betman watchlist quality
        shell: bash
        run: python3 -m batch.src.jobs.report_daily_pick_segment_quality_job --candidate-limit 10
