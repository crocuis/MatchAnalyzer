name: ingest-markets

permissions:
  contents: read

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r batch/requirements.txt
      - run: python3 -m batch.src.ingest.fetch_markets
