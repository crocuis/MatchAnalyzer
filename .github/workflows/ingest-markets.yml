name: ingest-markets

permissions:
  contents: read

on:
  schedule:
    # Every 8 hours. Manual dispatch remains available for urgent market refreshes.
    - cron: "15 */8 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "UTC date to sync in YYYY-MM-DD format. Defaults to current UTC date."
        required: false
        type: string

jobs:
  ingest:
    concurrency:
      group: ingest-markets
      cancel-in-progress: true
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ODDS_API_IO_BOOKMAKERS: Bet365,Unibet
      BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
      BSD_LINEUP_LOOKAHEAD_HOURS: 48
      MARKET_CHECKPOINT_TYPES: T_MINUS_24H,T_MINUS_6H,T_MINUS_1H,LINEUP_CONFIRMED
      R2_BUCKET: workflow-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: batch/requirements.txt
      - run: |
          test -n "$DATABASE_URL"
          test -n "$R2_BUCKET"
      - name: Resolve target date
        shell: bash
        run: |
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE="$(date -u +%F)"
          fi
          echo "REAL_MARKET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
      - run: python3 -m pip install -r batch/requirements.txt
      - name: Sync market target snapshots
        shell: bash
        run: |
          PREDICTION_SYNC_TARGET_DATE="$REAL_MARKET_DATE" \
          PREDICTION_SYNC_TARGET_CHECKPOINT_TYPES="$MARKET_CHECKPOINT_TYPES" \
            python3 -m batch.src.jobs.sync_prediction_checkpoints_job
      - name: Ingest markets
        shell: bash
        run: |
          MARKET_LOG="$(mktemp)"
          python3 -m batch.src.jobs.ingest_markets_job | tee "$MARKET_LOG"
          CHANGED_MATCH_IDS="$(
            python3 -c 'import json, sys; from pathlib import Path; lines = [line.strip() for line in Path(sys.argv[1]).read_text().splitlines() if line.strip()]; payload = json.loads(lines[-1]) if lines else {}; print(",".join(payload.get("changed_match_ids", [])))' "$MARKET_LOG"
          )"
          if [ -z "$CHANGED_MATCH_IDS" ]; then
            echo "No changed market matches detected."
            exit 0
          fi
          echo "Changed market match ids: $CHANGED_MATCH_IDS"
          echo "Prediction refresh is intentionally deferred to run-predictions or sync-prediction-checkpoints."
