name: ingest-markets

permissions:
  contents: read

on:
  schedule:
    - cron: "15 */4 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "UTC date to sync in YYYY-MM-DD format. Defaults to current UTC date."
        required: false
        type: string

jobs:
  ingest:
    concurrency:
      group: ingest-markets
      cancel-in-progress: true
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      R2_BUCKET: workflow-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: batch/requirements.txt
      - run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$R2_BUCKET"
      - name: Resolve target date
        shell: bash
        run: |
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE="$(date -u +%F)"
          fi
          echo "REAL_MARKET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
      - run: python3 -m pip install -r batch/requirements.txt
      - name: Ingest markets and refresh changed predictions
        shell: bash
        run: |
          MARKET_LOG="$(mktemp)"
          python3 -m batch.src.jobs.ingest_markets_job | tee "$MARKET_LOG"
          CHANGED_MATCH_IDS="$(
            python3 -c 'import json, sys; from pathlib import Path; lines = [line.strip() for line in Path(sys.argv[1]).read_text().splitlines() if line.strip()]; payload = json.loads(lines[-1]) if lines else {}; print(",".join(payload.get("changed_match_ids", [])))' "$MARKET_LOG"
          )"
          if [ -z "$CHANGED_MATCH_IDS" ]; then
            echo "No changed market matches detected; skipping prediction refresh."
            exit 0
          fi
          REAL_PREDICTION_MATCH_IDS="$CHANGED_MATCH_IDS" \
            python3 -m batch.src.jobs.run_predictions_job
