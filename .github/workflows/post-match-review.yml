name: post-match-review

permissions:
  contents: read

on:
  schedule:
    - cron: "45 * * * *"
  workflow_dispatch:

jobs:
  review:
    concurrency:
      group: post-match-review
      cancel-in-progress: false
    env:
      SUPABASE_URL: https://placeholder.supabase.local
      SUPABASE_SERVICE_KEY: placeholder-service-key
      R2_BUCKET: workflow-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r batch/requirements.txt
      - run: python3 -m batch.src.jobs.run_post_match_review_job
