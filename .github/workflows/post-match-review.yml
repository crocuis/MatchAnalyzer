name: post-match-review

permissions:
  contents: read

on:
  schedule:
    - cron: "45 * * * *"
  workflow_dispatch:

jobs:
  review:
    concurrency:
      group: post-match-review
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_KEY"
          test -n "$R2_BUCKET"
      - run: python3 -m pip install -r batch/requirements.txt
      - run: python3 -m batch.src.jobs.run_post_match_review_job
