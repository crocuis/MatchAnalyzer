name: post-match-review

on:
  schedule:
    - cron: "45 * * * *"
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r batch/requirements.txt
      - run: python3 batch/src/review/post_match_review.py
